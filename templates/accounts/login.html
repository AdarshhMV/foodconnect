{% extends 'base.html' %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="card narrow auth-card fade-card">
            <div class="card-body p-lg-5">
                <span class="eyebrow">Welcome back</span>
                <h1>Log in to FoodConnect</h1>
                <p>Manage listings, review requests, and keep food moving to the people who need it.</p>
                <form method="post" class="stack-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success ui-btn w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
