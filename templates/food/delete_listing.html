{% extends 'base.html' %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-lg-7">
        <section class="card narrow fade-card">
            <div class="card-body p-lg-5">
                <span class="eyebrow">Remove listing</span>
                <h1>Delete listing</h1>
                <p>Are you sure you want to delete <strong>{{ listing.title }}</strong>?</p>
                <form method="post" class="inline-actions">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger ui-btn">Yes, Delete</button>
                    <a class="btn btn-outline-secondary ui-btn" href="{% url 'dashboard' %}">Cancel</a>
                </form>
            </div>
        </section>
    </div>
</section>
{% endblock %}
