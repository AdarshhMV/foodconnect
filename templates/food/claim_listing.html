{% extends 'base.html' %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-lg-7">
        <section class="card narrow fade-card">
            <div class="card-body p-lg-5">
                <span class="eyebrow">Request food</span>
                <h1>Claim {{ listing.title }}</h1>
                <p>Add an optional note for the donor.</p>
                <form method="post" class="stack-form">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success ui-btn w-100">Confirm Claim</button>
                </form>
            </div>
        </section>
    </div>
</section>
{% endblock %}
